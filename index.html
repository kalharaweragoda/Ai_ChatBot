<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIAT Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-lg shadow-xl flex flex-col h-[500px]">
        
        <div class="bg-blue-600 p-4 rounded-t-lg">
            <h1 class="text-white text-xl font-bold">JIAT Chatbot</h1>
        </div>

        <div id="chat-window" class="flex-1 p-4 overflow-y-auto space-y-4">
            <div class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] text-sm">
                    Hello! Welcome to JIAT. How can I help you today?
                </div>
            </div>
        </div>

        <div class="p-4 border-t flex gap-2">
            <input type="text" id="user-input" placeholder="Type a message..." 
                class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="send-btn" 
                class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition font-semibold">
                Send
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
